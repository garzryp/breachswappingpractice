<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breach Swap (2 + Click) Trainer</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #333; width: 400px; margin: 0 auto; padding: 40px; border-radius: 15px; background: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .indicator { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .box { width: 80px; height: 80px; line-height: 80px; border: 3px solid #444; border-radius: 10px; font-weight: bold; font-size: 1.5em; transition: 0.1s; }
        .active { background: #007bff; border-color: #00d4ff; color: white; transform: scale(1.05); }
        .success-bg { background: #28a745 !important; border-color: #34ce57 !important; }
        .fail-bg { background: #dc3545 !important; border-color: #ff4d5e !important; }
        #feedback { font-size: 1.2em; height: 1.5em; margin: 20px 0; }
        .stats { color: #888; border-top: 1px solid #333; pt: 20px; }
        strong { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Breach Swap Trainer</h1>
        <p>Press <strong>"2"</strong> then <strong>Left Click</strong> instantly.</p>

        <div class="indicator">
            <div id="keyBox" class="box">2</div>
            <div id="clickBox" class="box">LMB</div>
        </div>

        <div id="feedback">READY...</div>

        <div class="stats">
            Timing: <span id="ms-diff">0</span>ms<br>
            Result: <span id="result-text">---</span>
        </div>
    </div>

    <script>
        let swapTime = 0;
        let waitingForClick = false;
        const TICK_MS = 50;

        const keyBox = document.getElementById('keyBox');
        const clickBox = document.getElementById('clickBox');
        const feedback = document.getElementById('feedback');
        const msDisplay = document.getElementById('ms-diff');
        const resultDisplay = document.getElementById('result-text');

        window.addEventListener('keydown', (e) => {
            if (e.key === '2') {
                swapTime = performance.now();
                waitingForClick = true;
                
                // Reset visuals
                keyBox.className = "box active";
                clickBox.className = "box";
                feedback.innerText = "CLICK NOW!";
                feedback.style.color = "#ffcc00";
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (waitingForClick && e.button === 0) { // 0 is Left Click
                const clickTime = performance.now();
                const diff = clickTime - swapTime;
                waitingForClick = false;

                clickBox.className = "box active";
                msDisplay.innerText = diff.toFixed(2);

                if (diff <= TICK_MS) {
                    feedback.innerText = "TICK PERFECT!";
                    feedback.style.color = "#28a745";
                    resultDisplay.innerText = "SUCCESS (Same Tick)";
                    keyBox.classList.add('success-bg');
                    clickBox.classList.add('success-bg');
                } else {
                    feedback.innerText = "TOO SLOW";
                    feedback.style.color = "#dc3545";
                    resultDisplay.innerText = `FAILED (Delayed by ${Math.floor(diff / TICK_MS)} ticks)`;
                    keyBox.classList.add('fail-bg');
                    clickBox.classList.add('fail-bg');
                }
            }
        });
    </script>
</body>
</html>
