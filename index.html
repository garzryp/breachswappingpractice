<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breach Crit-Swap Trainer</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-top: 50px; overflow: hidden; }
        .container { border: 2px solid #333; width: 500px; margin: 0 auto; padding: 30px; border-radius: 15px; background: #1e1e1e; position: relative; }
        .indicator { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .box { width: 65px; height: 65px; line-height: 65px; border: 3px solid #444; border-radius: 10px; font-weight: bold; transition: 0.1s; color: #555; }
        
        /* State Colors */
        .active-step { border-color: #007bff; color: #fff; box-shadow: 0 0 10px #007bff; }
        .success { background: #28a745; border-color: #34ce57; color: white; }
        .fail { background: #dc3545; border-color: #ff4d5e; color: white; }
        .jump-box { border-radius: 50%; } /* Circle for jump */

        #jump-meter { height: 10px; background: #333; margin: 10px 0; border-radius: 5px; overflow: hidden; }
        #jump-bar { height: 100%; width: 0%; background: #00d4ff; transition: width 0.3s linear; }

        #history { margin-top: 20px; text-align: left; max-height: 150px; overflow-y: auto; background: #151515; padding: 10px; border-radius: 5px; font-family: monospace; }
        .log-entry { border-bottom: 1px solid #222; padding: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Breach Swap Trainer</h1>
        <p>Space (Jump) ➔ 2 + LMB (Mid-air) ➔ 1 (Reset)</p>

        <div id="jump-meter"><div id="jump-bar"></div></div>

        <div class="indicator">
            <div id="step-space" class="box jump-box">⎵</div>
            <div id="step-2" class="box">2</div>
            <div id="step-lmb" class="box">LMB</div>
            <div id="step-1" class="box">1</div>
        </div>

        <h2 id="feedback">PRESS SPACE TO JUMP</h2>

        <div id="history"></div>
    </div>

    <script>
        let stage = 0; // 0: Space, 1: Swap/Hit, 2: Reset
        let swapTime = 0;
        let isFalling = false;
        const TICK_MS = 50;

        const elSpace = document.getElementById('step-space');
        const el2 = document.getElementById('step-2');
        const elLMB = document.getElementById('step-lmb');
        const el1 = document.getElementById('step-1');
        const jumpBar = document.getElementById('jump-bar');
        const feedback = document.getElementById('feedback');

        window.addEventListener('keydown', (e) => {
            // STEP 1: JUMP
            if (e.code === 'Space' && stage === 0) {
                stage = 1;
                elSpace.className = "box jump-box success";
                feedback.innerText = "SWAP + HIT!";
                
                // Simulate jump arc (approx 600ms)
                jumpBar.style.width = "100%";
                setTimeout(() => { isFalling = true; }, 300); // Falling after peak
                setTimeout(() => { 
                    if (stage === 1) { fail("TOO LATE - LANDED"); }
                    jumpBar.style.width = "0%";
                    isFalling = false;
                }, 600);
            }

            // STEP 2: SWAP (Start timing)
            if (e.key === '2' && stage === 1) {
                swapTime = performance.now();
                el2.className = "box active-step";
            }

            // STEP 3: RESET
            if (e.key === '1' && stage === 2) {
                resetAll();
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (stage === 1 && e.button === 0) {
                const clickTime = performance.now();
                const diff = clickTime - swapTime;
                
                if (swapTime === 0) {
                    fail("SWAP BEFORE CLICKING!");
                    return;
                }

                stage = 2;
                const hitInTick = diff <= TICK_MS;
                const hitInAir = isFalling;

                if (hitInTick && hitInAir) {
                    success(diff);
                } else {
                    fail(hitInTick ? "MISSED CRIT (STILL RISING)" : `TOO SLOW (${diff.toFixed(1)}ms)`);
                }
            }
        });

        function success(ms) {
            el2.className = "box success";
            elLMB.className = "box success";
            el1.className = "box active-step";
            feedback.innerText = "CRIT + TICK PERFECT!";
            feedback.style.color = "#28a745";
            log(ms, true);
        }

        function fail(reason) {
            stage = 2;
            el2.className = "box fail";
            elLMB.className = "box fail";
            el1.className = "box active-step";
            feedback.innerText = reason;
            feedback.style.color = "#dc3545";
            log(0, false, reason);
        }

        function resetAll() {
            stage = 0; swapTime = 0; isFalling = false;
            elSpace.className = "box jump-box";
            el2.className = "box"; elLMB.className = "box"; el1.className = "box";
            jumpBar.style.width = "0%";
            feedback.innerText = "PRESS SPACE TO JUMP";
            feedback.style.color = "#e0e0e0";
        }

        function log(ms, isOk, reason = "") {
            const entry = document.createElement('div');
            entry.className = "log-entry";
            entry.innerHTML = `<span>${isOk ? "✔" : "✘"} ${reason}</span> <span>${ms > 0 ? ms.toFixed(1) + "ms" : ""}</span>`;
            entry.style.color = isOk ? "#28a745" : "#dc3545";
            document.getElementById('history').prepend(entry);
        }
    </script>
</body>
</html>
